<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Audition-App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="player">
      <!-- Sélection du bruit -->
      <div class="sound-selection">
        <button data-sound="white noise">Bruit Blanc</button>
        <button data-sound="pink noise">Bruit Rose</button>
        <button data-sound="brown noise">Bruit Marron</button>
      </div>

      <!-- Slider volume -->
      <div class="volume-control">
        <label for="volume">Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" />
      </div>

      <!-- Bouton Play -->
      <div class="controls">
        <button id="play">Play</button>
      </div>

      <!-- Timer -->
      <div class="timer">
        <span id="time">00:00</span>
      </div>

      <!-- SECTION QUESTIONNAIRE -->
      <div class="questionnaire">
        <!-- vide pour l’instant -->
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>

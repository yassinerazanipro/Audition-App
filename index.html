<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Audition-App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <audio id="audio" loop></audio>
    <div class="player">
      <!-- Sélection du bruit -->
      <div class="sound-selection">
        <button data-sound="white noise">Bruit Blanc</button>
        <button data-sound="pink noise">Bruit Rose</button>
        <button data-sound="brown noise">Bruit Marron</button>
      </div>

      <!-- Slider volume -->
      <div class="volume-control">
        <label for="volume">Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" />
      </div>

      <!-- Bouton Play -->
      <div class="controls">
        <button id="play">Play</button>
      </div>

      <!-- Timer -->
      <div class="timer-controls">
        <button data-time="1800">30 min</button>
        <button data-time="3600">1 h</button>
        <button data-time="7200">2 h</button>
      </div>

      <div class="timer">
        <span id="time">00:00</span>
      </div>

      <!-- SECTION QUESTIONNAIRE -->
      <div class="questionnaire">
        <!-- vide pour l’instant -->
      </div>
    </div>
    <script>
      const audio = document.getElementById("audio");
      const buttons = document.querySelectorAll(".sound-selection button");

      const sounds = {
        "white noise": "white.mp3",
        "pink noise": "pink.mp3",
        "brown noise": "brown.mp3",
      };

      let currentSound = null;

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const sound = button.dataset.sound;
          audio.src = sounds[sound];
          currentSound = sound;
        });
      });
    </script>
    <script>
      const playBtn = document.getElementById("play");

      playBtn.addEventListener("click", () => {
        if (audio.src) {
          audio.play();
        } else {
          alert("Choisis un son d'abord");
        }
      });
    </script>
    <script>
      const volume = document.getElementById("volume");

      volume.addEventListener("input", () => {
        audio.volume = volume.value;
      });
    </script>
    <script>
      const timeDisplay = document.getElementById("time");

      audio.addEventListener("timeupdate", () => {
        const minutes = Math.floor(audio.currentTime / 60);
        const seconds = Math.floor(audio.currentTime % 60);

        timeDisplay.textContent =
          String(minutes).padStart(2, "0") +
          ":" +
          String(seconds).padStart(2, "0");
      });
    </script>
  </body>
</html>
